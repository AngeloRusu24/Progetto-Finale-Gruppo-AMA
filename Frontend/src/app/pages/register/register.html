<div class="page">


  <nav class="navbar">
  <img src="/LOGO.png" alt="La Ricetta Perfetta" class="logo">
  <div class="nav-links">
    <a class="nav-link" routerLink="/">Home</a>
    <a class="nav-link" routerLink="/recipes">Ricette</a>
    <a class="nav-link" routerLink="/profile">Profilo</a>
    <button class="btn-primary" routerLink="/login">Accedi</button>
  </div>
</nav>


  <div class="register-container">

    <div class="register-header">
      <h1 class="title">REGISTRAZIONE</h1>
      <p class="subtitle">CREA UN ACCOUNT</p>
    </div>

    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">

      <div class="form-group">
        <label>Nome</label>
        <input type="text" formControlName="name" placeholder="Inserisci il tuo nome">

        <small *ngIf="registerForm.get('name')?.touched && registerForm.get('name')?.invalid">
          Nome obbligatorio
        </small>
      </div>

      <div class="form-group">
        <label>Cognome</label>
        <input type="text" formControlName="surname" placeholder="Inserisci il tuo cognome">

        <small *ngIf="registerForm.get('surname')?.touched && registerForm.get('surname')?.invalid">
          Cognome obbligatorio
        </small>
      </div>

      <div class="form-group">
        <label>Data di nascita</label>
        <input type="date" formControlName="birthDate">

        <small *ngIf="registerForm.get('birthDate')?.touched && registerForm.get('birthDate')?.invalid">
          Inserisci la data di nascita
        </small>
      </div>

      <div class="form-group">
        <label>Email</label>
        <input type="email" formControlName="email" placeholder="nome@esempio.com">

        <small *ngIf="registerForm.get('email')?.touched && registerForm.get('email')?.errors?.['required']">
          Email obbligatoria
        </small>

        <small *ngIf="registerForm.get('email')?.touched && registerForm.get('email')?.errors?.['email']">
          Email non valida
        </small>
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" formControlName="password" placeholder="Minimo 6 caratteri">

        <small *ngIf="registerForm.get('password')?.touched && registerForm.get('password')?.errors?.['required']">
          Password obbligatoria
        </small>

        <small *ngIf="registerForm.get('password')?.touched && registerForm.get('password')?.errors?.['minlength']">
          Minimo 6 caratteri
        </small>
      </div>

      <div class="form-group">
        <label>Conferma Password</label>
        <input type="password" formControlName="confirmPassword">

        <small *ngIf="registerForm.get('confirmPassword')?.touched && registerForm.get('confirmPassword')?.invalid">
          Conferma la password
        </small>
      </div>

      <div class="error-message"
           *ngIf="registerForm.get('password')?.value !== registerForm.get('confirmPassword')?.value
          && registerForm.get('confirmPassword')?.touched">
        Le password non coincidono
      </div>

      <button type="submit" [disabled]="registerForm.invalid">
        Registrati
      </button>

      <div class="login-link">
        Hai già un account?
        <a routerLink="/login">Login</a>
      </div>

    </form>

  </div>
</div>

<div class="page">


  <nav class="navbar">
  <img src="/LOGO.png" alt="La Ricetta Perfetta" class="logo">
  <span class="logo-text">La Ricetta Perfetta</span>
  <div class="nav-links">
    <a class="nav-link" routerLink="/">Home</a>
    <a class="nav-link" routerLink="/recipes">Ricette</a>
    <a class="nav-link" routerLink="/profile">Profilo</a>
<a class="btn-primary" routerLink="/login">Accedi</a>
  </div>
</nav>


  <div class="form-container">

    <div class="login-header">
      <h1 class="logo">LOGIN</h1>
      <p class="subtitle">Bentornato!</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">

      <div class="form-group">
        <label>Email</label>
        <input type="email" formControlName="email" placeholder="nome@esempio.com">

        <small *ngIf="loginForm.get('email')?.touched && loginForm.get('email')?.errors?.['required']">
          Email obbligatoria
        </small>

        <small *ngIf="loginForm.get('email')?.touched && loginForm.get('email')?.errors?.['email']">
          Email non valida
        </small>
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" formControlName="password" placeholder="Inserisci la password">

        <small *ngIf="loginForm.get('password')?.touched && loginForm.get('password')?.errors?.['required']">
          Password obbligatoria
        </small>

        <small *ngIf="loginForm.get('password')?.touched && loginForm.get('password')?.errors?.['minlength']">
          Minimo 6 caratteri
        </small>
      </div>

      <button type="submit" [disabled]="loginForm.invalid">
        Login
      </button>

      <div class="register-link">
        Non hai un account?
        <a routerLink="/register">Registrati</a>
      </div>

    </form>
  </div>
</div>
